name: sportsync
description: A sports court booking app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.0.0
  go_router: ^13.0.0
  flutter_riverpod: ^2.5.0
  google_maps_flutter: ^2.5.0
  http: ^1.2.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/